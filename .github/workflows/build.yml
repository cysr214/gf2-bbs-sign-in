name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            build_cmd: bun run build
            binary: gf2-bbs-sign-in
          - os: macos-latest
            platform: darwin-aarch64
            build_cmd: bun run build
            binary: gf2-bbs-sign-in
          - os: windows-latest
            platform: windows-x64
            build_cmd: bun run build:win
            binary: gf2-bbs-sign-in.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -j "../gf2-bbs-sign-in-${{ matrix.platform }}.zip" "${{ matrix.binary }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "gf2-bbs-sign-in-${{ matrix.platform }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gf2-bbs-sign-in-${{ matrix.platform }}
          path: gf2-bbs-sign-in-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
